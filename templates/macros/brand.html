{% macro brand_logo(size='md', uid='lp', animated=true) %}
<span class="lp-logo lp-logo--{{ size }}{% if animated %} lp-logo--animated{% endif %}" role="img" aria-label="{{ _('app.name') }}">
  <svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
    <defs>
      <linearGradient id="{{ uid }}-bg" x1="8" y1="4" x2="56" y2="60" gradientUnits="userSpaceOnUse">
        <stop stop-color="#1E3A8A"/>
        <stop offset="1" stop-color="#2563EB"/>
      </linearGradient>
      <linearGradient id="{{ uid }}-shine" x1="20" y1="12" x2="44" y2="52" gradientUnits="userSpaceOnUse">
        <stop stop-color="#FFFFFF" stop-opacity="0.28"/>
        <stop offset="1" stop-color="#FFFFFF" stop-opacity="0"/>
      </linearGradient>
      <linearGradient id="{{ uid }}-drop" x1="14" y1="44" x2="22" y2="54" gradientUnits="userSpaceOnUse">
        <stop stop-color="#38BDF8"/>
        <stop offset="1" stop-color="#10B981"/>
      </linearGradient>
    </defs>

    <circle class="lp-logo__ring" cx="32" cy="32" r="29" stroke="url(#{{ uid }}-bg)" stroke-width="1.5" opacity="0.35"/>

    <rect x="5" y="5" width="54" height="54" rx="15" fill="url(#{{ uid }}-bg)"/>
    <rect x="5" y="5" width="54" height="54" rx="15" fill="url(#{{ uid }}-shine)"/>

    <g class="lp-logo__phone">
      <path d="M24 18c0-1.1.9-2 2-2h12c1.1 0 2 .9 2 2v28c0 1.1-.9 2-2 2H26c-1.1 0-2-.9-2-2V18z" fill="#fff" opacity="0.95"/>
      <rect x="27" y="21" width="10" height="3" rx="1.5" fill="#1E3A8A" opacity="0.35"/>
      <circle cx="32" cy="42" r="3" fill="#1E3A8A" opacity="0.25"/>
    </g>

    <g class="lp-logo__waves" stroke="#fff" stroke-width="2.5" stroke-linecap="round" fill="none">
      <path class="lp-logo__wave lp-logo__wave--1" d="M41 26c3 0 5 2 5 5s-2 5-5 5"/>
      <path class="lp-logo__wave lp-logo__wave--2" d="M44 22c5 0 9 4 9 9s-4 9-9 9"/>
      <path class="lp-logo__wave lp-logo__wave--3" d="M47 18c7 0 13 6 13 13s-6 13-13 13"/>
    </g>

    <path class="lp-logo__drop" d="M18 46c0-3.5 2.8-6.5 4-8.5 1.2 2 4 5 4 8.5a4 4 0 1 1-8 0z" fill="url(#{{ uid }}-drop)"/>

    <circle class="lp-logo__spark lp-logo__spark--1" cx="48" cy="16" r="2" fill="#FDE68A"/>
    <circle class="lp-logo__spark lp-logo__spark--2" cx="52" cy="22" r="1.2" fill="#93C5FD"/>
  </svg>
</span>
{% endmacro %}
