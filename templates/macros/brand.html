{% macro brand_logo(size='md', uid='lp', animated=true) %}
<span class="lp-logo lp-logo--{{ size }}{% if animated %} lp-logo--animated{% endif %}" role="img" aria-label="{{ _('app.name') }}">
  <svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
    <defs>
      <linearGradient id="{{ uid }}-bg" x1="10" y1="6" x2="54" y2="58" gradientUnits="userSpaceOnUse">
        <stop stop-color="#0F172A"/>
        <stop offset="0.45" stop-color="#1E3A8A"/>
        <stop offset="1" stop-color="#2563EB"/>
      </linearGradient>
      <linearGradient id="{{ uid }}-shine" x1="18" y1="10" x2="46" y2="50" gradientUnits="userSpaceOnUse">
        <stop stop-color="#FFFFFF" stop-opacity="0.34"/>
        <stop offset="1" stop-color="#FFFFFF" stop-opacity="0"/>
      </linearGradient>
      <linearGradient id="{{ uid }}-core" x1="24" y1="22" x2="40" y2="42" gradientUnits="userSpaceOnUse">
        <stop stop-color="#E0F2FE"/>
        <stop offset="1" stop-color="#FFFFFF"/>
      </linearGradient>
      <linearGradient id="{{ uid }}-drop" x1="15" y1="44" x2="23" y2="54" gradientUnits="userSpaceOnUse">
        <stop stop-color="#22D3EE"/>
        <stop offset="1" stop-color="#10B981"/>
      </linearGradient>
      <radialGradient id="{{ uid }}-glow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(32 30) rotate(90) scale(22)">
        <stop stop-color="#60A5FA" stop-opacity="0.35"/>
        <stop offset="1" stop-color="#60A5FA" stop-opacity="0"/>
      </radialGradient>
    </defs>

    <circle class="lp-logo__ring" cx="32" cy="32" r="29" stroke="url(#{{ uid }}-bg)" stroke-width="1.5" opacity="0.4"/>

    <rect x="4" y="4" width="56" height="56" rx="18" fill="url(#{{ uid }}-bg)"/>
    <rect x="4" y="4" width="56" height="56" rx="18" fill="url(#{{ uid }}-shine)"/>
    <circle cx="32" cy="30" r="22" fill="url(#{{ uid }}-glow)"/>

    <g class="lp-logo__core">
      <circle cx="32" cy="30" r="11" fill="url(#{{ uid }}-core)" opacity="0.96"/>
      <circle cx="32" cy="30" r="5.5" fill="#1D4ED8"/>
      <circle class="lp-logo__dot" cx="32" cy="30" r="2.2" fill="#FFFFFF"/>
    </g>

    <g class="lp-logo__waves" stroke="#FFFFFF" stroke-width="2.4" stroke-linecap="round" fill="none" opacity="0.92">
      <path class="lp-logo__wave lp-logo__wave--1" d="M44 22c6 0 11 5 11 11"/>
      <path class="lp-logo__wave lp-logo__wave--2" d="M46 18c9 0 16 7 16 16"/>
      <path class="lp-logo__wave lp-logo__wave--3" d="M48 14c12 0 22 10 22 22"/>
    </g>

    <path class="lp-logo__ear lp-logo__ear--l" d="M20 18c0-1.1.9-2 2-2h1.8c1 0 1.8.8 1.8 1.8v5.4c0 1-.8 1.8-1.8 1.8H22c-1.1 0-2-.9-2-2V18z" fill="#FFFFFF" opacity="0.9"/>
    <path class="lp-logo__ear lp-logo__ear--r" d="M42 38c0-1.1.9-2 2-2h1.8c1 0 1.8.8 1.8 1.8v5.4c0 1-.8 1.8-1.8 1.8H44c-1.1 0-2-.9-2-2V38z" fill="#FFFFFF" opacity="0.9"/>

    <path class="lp-logo__drop" d="M17 47c0-3.4 2.7-6.3 3.8-8.2 1.1 1.9 3.8 4.8 3.8 8.2a3.8 3.8 0 1 1-7.6 0z" fill="url(#{{ uid }}-drop)"/>

    <path class="lp-logo__spark lp-logo__spark--1" d="M49 15.5l1.4 2.8 3.1.4-2.2 2.1.5 3.1-2.8-1.5-2.8 1.5.5-3.1-2.2-2.1 3.1-.4z" fill="#FDE68A"/>
  </svg>
</span>
{% endmacro %}
