{% macro brand_logo(size='md', uid='lp', animated=true) %}
<span class="lp-logo lp-logo--{{ size }}{% if animated %} lp-logo--animated{% endif %}" role="img" aria-label="{{ _('app.name') }}">
  <svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
    <defs>
      <linearGradient id="{{ uid }}-bg" x1="8" y1="4" x2="56" y2="60" gradientUnits="userSpaceOnUse">
        <stop stop-color="#0F2D6E"/>
        <stop offset="0.5" stop-color="#1B57E0"/>
        <stop offset="1" stop-color="#2563EB"/>
      </linearGradient>
      <linearGradient id="{{ uid }}-shine" x1="16" y1="8" x2="48" y2="52" gradientUnits="userSpaceOnUse">
        <stop stop-color="#FFFFFF" stop-opacity="0.28"/>
        <stop offset="1" stop-color="#FFFFFF" stop-opacity="0"/>
      </linearGradient>
      <linearGradient id="{{ uid }}-needle" x1="32" y1="18" x2="32" y2="46" gradientUnits="userSpaceOnUse">
        <stop stop-color="#FFFFFF"/>
        <stop offset="1" stop-color="#BFDBFE"/>
      </linearGradient>
      <linearGradient id="{{ uid }}-accent" x1="20" y1="40" x2="44" y2="52" gradientUnits="userSpaceOnUse">
        <stop stop-color="#06B6D4"/>
        <stop offset="1" stop-color="#10B981"/>
      </linearGradient>
    </defs>
    <rect x="4" y="4" width="56" height="56" rx="16" fill="url(#{{ uid }}-bg)"/>
    <rect x="4" y="4" width="56" height="56" rx="16" fill="url(#{{ uid }}-shine)"/>
    <circle class="lp-logo__ring" cx="32" cy="32" r="20" stroke="#FFFFFF" stroke-opacity="0.18" stroke-width="1.5"/>
    <circle class="lp-logo__ring-inner" cx="32" cy="32" r="14" stroke="#FFFFFF" stroke-opacity="0.12" stroke-width="1"/>
    <path class="lp-logo__needle" d="M32 20 L36 38 L32 34 L28 38 Z" fill="url(#{{ uid }}-needle)"/>
    <g class="lp-logo__core">
      <circle cx="32" cy="32" r="4.5" fill="#FFFFFF" opacity="0.95"/>
      <circle class="lp-logo__dot" cx="32" cy="32" r="2" fill="#1B57E0"/>
    </g>
    <g class="lp-logo__waves" stroke="#06B6D4" stroke-width="2" stroke-linecap="round" fill="none" opacity="0.85">
      <path class="lp-logo__wave lp-logo__wave--1" d="M46 24c5 0 9 4 9 9"/>
      <path class="lp-logo__wave lp-logo__wave--2" d="M48 20c8 0 14 6 14 14"/>
    </g>
    <path class="lp-logo__trail" d="M18 46h28" stroke="url(#{{ uid }}-accent)" stroke-width="2.5" stroke-linecap="round"/>
    <circle class="lp-logo__spark lp-logo__spark--1" cx="18" cy="46" r="2.5" fill="#10B981"/>
    <circle class="lp-logo__spark lp-logo__spark--2" cx="46" cy="46" r="2.5" fill="#06B6D4"/>
  </svg>
</span>
{% endmacro %}
